name: 🐛 Bug 报告 | Bug Report
description: 报告一个软件缺陷 | Report a software bug
labels: ['bug']
body:
    # ============================================================
    # 中文 | Chinese
    # ============================================================
    - type: markdown
      attributes:
          value: |
              感谢你提交 Bug 报告！请尽可能详细地填写以下信息，这将帮助我们更快地定位和修复问题。

              > **注意**：插件相关的问题请勿在此提交，本项目仅是播放器，不提供音源。
              >
              > **关于处理流程**：Issue 默认保持开放，被标记为 `accepted` 后才会进入排期；长期未被 `accepted` 且无活动的 Issue 会被自动标记 `stale` 并关闭。修复此问题的 PR 需在描述中用 `Closes #编号` 关联一个已 `accepted` 的 Issue。

    - type: checkboxes
      id: checklist
      attributes:
          label: 提交前确认
          options:
              - label: 我已搜索过现有 Issues，确认没有重复的问题
                required: true
              - label: 我确认这不是插件相关的问题
                required: true

    - type: input
      id: version
      attributes:
          label: 软件版本
          description: 打开设置页面可查看版本号
          placeholder: '例如：0.5.0'
      validations:
          required: true

    - type: dropdown
      id: os
      attributes:
          label: 操作系统
          options:
              - Windows
              - macOS
              - Linux
      validations:
          required: true

    - type: input
      id: os-version
      attributes:
          label: 系统版本
          placeholder: '例如：Windows 11 23H2 / macOS 15.0 / Ubuntu 24.04'
      validations:
          required: true

    - type: textarea
      id: description
      attributes:
          label: 问题描述
          description: 清晰简洁地描述你遇到的问题
      validations:
          required: true

    - type: textarea
      id: steps
      attributes:
          label: 复现步骤
          description: 详细描述如何复现这个问题
          placeholder: |
              1. 打开软件
              2. 点击 ...
              3. 执行 ...
              4. 出现错误
      validations:
          required: true

    - type: textarea
      id: expected
      attributes:
          label: 预期行为
          description: 描述你期望发生的行为
      validations:
          required: true

    - type: textarea
      id: actual
      attributes:
          label: 实际行为
          description: 描述实际发生的行为
      validations:
          required: true

    - type: textarea
      id: screenshots
      attributes:
          label: 截图或日志
          description: 如有截图或错误日志，请粘贴在此处
      validations:
          required: false

    - type: textarea
      id: additional
      attributes:
          label: 补充信息
          description: 其他可能有帮助的信息
      validations:
          required: false

    # ============================================================
    # English | 英文
    # ============================================================
    - type: markdown
      attributes:
          value: |
              ---

              Thank you for submitting a bug report! Please fill in the following information as thoroughly as possible to help us locate and fix the issue faster.

              > **Note**: Please do not submit plugin-related issues here. This project is a player only and does not provide music sources.
              >
              > **How issues are handled**: Issues stay open by default and only get scheduled once marked `accepted`. Issues left without `accepted` and with no activity are eventually marked `stale` and closed. A PR fixing this bug must reference an `accepted` issue via `Closes #<number>` in its description.

    - type: checkboxes
      id: checklist-en
      attributes:
          label: Pre-submission checklist
          options:
              - label: I have searched existing Issues and confirmed this is not a duplicate
                required: true
              - label: I confirm this is not a plugin-related issue
                required: true

    - type: input
      id: version-en
      attributes:
          label: App Version
          description: You can find the version number on the Settings page
          placeholder: 'e.g. 0.5.0'
      validations:
          required: true

    - type: dropdown
      id: os-en
      attributes:
          label: Operating System
          options:
              - Windows
              - macOS
              - Linux
      validations:
          required: true

    - type: input
      id: os-version-en
      attributes:
          label: OS Version
          placeholder: 'e.g. Windows 11 23H2 / macOS 15.0 / Ubuntu 24.04'
      validations:
          required: true

    - type: textarea
      id: description-en
      attributes:
          label: Bug Description
          description: A clear and concise description of the bug
      validations:
          required: true

    - type: textarea
      id: steps-en
      attributes:
          label: Steps to Reproduce
          description: Detailed steps to reproduce the issue
          placeholder: |
              1. Open the app
              2. Click on ...
              3. Perform ...
              4. Error occurs
      validations:
          required: true

    - type: textarea
      id: expected-en
      attributes:
          label: Expected Behavior
          description: Describe what you expected to happen
      validations:
          required: true

    - type: textarea
      id: actual-en
      attributes:
          label: Actual Behavior
          description: Describe what actually happened
      validations:
          required: true

    - type: textarea
      id: screenshots-en
      attributes:
          label: Screenshots or Logs
          description: If applicable, paste screenshots or error logs here
      validations:
          required: false

    - type: textarea
      id: additional-en
      attributes:
          label: Additional Context
          description: Any other information that might be helpful
      validations:
          required: false
